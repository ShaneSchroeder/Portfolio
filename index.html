<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="main.js?rev=1"></script>

    <title>Shane Schroeder</title>
</head>

<body id="mainBody">
    <div class="d-flex p-3 text-white text-center justify-content-center" id="nameContainer">
        <div class="row" id="name">
            <h1 class="text-responsive">I'm <span class="auto-type"></span></h1>
        </div>
    </div>


    <div class="container-fluid" id="cardContainer">
        <div class="row">
            <div class="col-lg-6 col-12">
                <div class="card text-white h-100" id="aboutMe">
                    <img src="images/headshotwithbackground_square.png" id="aboutMePic"
                        class="card-img my-auto rounded-circle">
                    <div class="card-img-overlay">
                        <h2 class="card-title">About Me</h2>
                        <div id="aboutMeScroll">
                            <marquee id="aboutMeScrollingText" behavior="scroll" direction="left" scrollamount="22">
                                I'm Shane Schroeder, Software Engineer.
                            </marquee>
                        </div>
                        <div id="aboutMeInfo">

                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-12">
                <div class="row">
                    <div class="col-md-6 col-6 B h-50 pb-3">
                        <div class="card text-white h-100" id="contact">
                            <div class="card-img-overlay">
                                <h3 class="card-title">Contact</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-6 B h-50 pb-3">
                        <div class="card text-white h-100" id="menu">
                            <div class="card-img-overlay">
                                <h3 class="card-title">Menu</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12 h-50">
                        <div class="card text-white h-100" id="passion">
                            <div class="card-img-overlay">
                                <div id="passionScroll">
                                    <marquee behavior="scroll" direction="left" scrollamount="22">
                                        Bioinformatics;High-Performance;Cybersecurity
                                    </marquee>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" id="row2">
            <div class="col-12 h-100 py-3">
                <div class="card text-white h-100" id="successes">
                    <div class="card-img-overlay">
                        <div id="successesScroll">
                            <marquee behavior="scroll" direction="left" scrollamount="22">
                                SUCCESS1,SUCCESS2,SUCCESS3,SUCCESS4
                            </marquee>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" id="row3">
            <div class="col-3 h-100 py-3">
                <div class="card text-white h-100" id="research">
                    <div class="card-img-overlay">
                        <h3 class="card-title">Research</h3>

                    </div>
                </div>
            </div>
            <div class="col-3 h-100 py-3">
                <div class="card text-white h-100" id="work">
                    <div class="card-img-overlay">
                        <h3 class="card-title">Work</h3>

                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="col-12 h-50 py-3">
                    <div class="card text-white h-100" id="education">
                        <img src="images/miami.svg" class="card-img my-auto fadeIn" width="150px" height="150px">
                        <div class="card-img-overlay">
                            <h3 class="card-title">Education</h3>

                        </div>
                    </div>
                </div>
                <div class="col-12 h-25 py-3">
                    <div class="card text-white h-100" id="skills">
                        <div class="card-img-overlay">
                            <h3 class="card-title">Skills</h3>

                        </div>
                    </div>
                </div>
                <div class="col-12 h-25 py-3">
                    <div class="card text-white h-100" id="goal">
                        <div class="card-img-overlay">
                            <h3 class="card-title">Goal</h3>

                        </div>
                    </div>
                </div>

            </div>
        </div>
        <div class="row" id="row4">
            <div class="col-12 h-100 py-3">
                <div class="card text-white h-100" id="projects">
                    <div class="card-img-overlay">
                        <div id="projectsScroll">
                            <marquee behavior="scroll" direction="left" scrollamount="22">
                                <a
                                    href="https://github.com/ShaneSchroeder/SchroederCryptography">Cryptography</a>,SUCCESS2,SUCCESS3,SUCCESS4
                            </marquee>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

    <script>
        var typed = new Typed(".auto-type", {
            strings: ["Shane Schroeder."],
            typeSpeed: 200
        })
    </script>
</body>

</html>
